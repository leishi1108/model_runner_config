[DEFAULT]
workspace = /home/shilei/fbpmx/list_standard/list_online_evaluate_${date}

[project]
actions = generate, evaluate, run
datasets = aecloud_list_cost_relation_dec, aecloud_list_quantity_relation_dec, aecloud_list_pricelib_relation_dec
evaluators = aecloud_list_cost_relation_dec_predict, aecloud_list_pricelib_relation_dec_predict
stages = aecloud_list_cost_relation_dec_export, aecloud_list_pricelib_relation_dec_export


[dataset_aecloud_list_pricelib_relation_dec]
class = GlodonAECloudRelationDecDataset
domain = aecloud-test.glodon.com
apiId = 117949901   # 成本测算-成本编制-精确匹配：清单定额-分包指导价
catalogId = 10058889902 # 正式工程验证集
compareVersionId = 29330073 # V0528-难例-发版前


[dataset_aecloud_list_pricelib_relation_dec_trans]
class = MapDataset
input = aecloud_list_pricelib_relation_dec
expression = exec('import re; import uuid') or {
    "清单名称": x["名称"],
    "项目特征": x["项目特征"],
    "分部分项全路径": x["全路径"],
    "单位工程名称": x["单位工程名称"],
    }
keep_exists = True



[evaluator_aecloud_list_pricelib_relation_dec_predict]
class = SimplePredictor
datasets = aecloud_list_pricelib_relation_dec_trans
models = tjqd2, bqitem_testrule
num_workers = 2


[dataset_aecloud_list_pricelib_relation_dec_for_export]
class = MapDataset
input = aecloud_list_pricelib_relation_dec_trans
expression = exec('import re; import uuid') or {

    "清单专业": ",".join(sorted(x["tjqd2_score"]["specialty"])) if x["tjqd2_score"] is not None else "",
    "清单brief专业": ",".join(sorted(x["bqitem_testrule_score"]["specialty"])) if x["bqitem_testrule_score"] is not None else "",

    "清单分部分项": ",".join(sorted(x["tjqd2_score"]["cost-partial"])) if x["tjqd2_score"] is not None else "",
    "清单brief分部分项": ",".join(sorted(x["bqitem_testrule_score"]["cost-partial"])) if x["bqitem_testrule_score"] is not None else "",

    "清单构件": ",".join(sorted(x["tjqd2_score"]["element"])) if x["tjqd2_score"] is not None else "",
    "清单brief构件": ",".join(sorted(x["bqitem_testrule_score"]["element"])) if x["bqitem_testrule_score"] is not None else "",

    "清单材料": ",".join(sorted(x["tjqd2_score"]["material"])) if x["tjqd2_score"] is not None else "",
    "清单brief材料": ",".join(sorted(x["bqitem_testrule_score"]["material"])) if x["bqitem_testrule_score"] is not None else "",

    "清单部位构件": ",".join(sorted(x["tjqd2_score"]["loc-element"])) if x["tjqd2_score"] is not None else "",
    "清单brief部位构件": ",".join(sorted(x["bqitem_testrule_score"]["loc-element"])) if x["bqitem_testrule_score"] is not None else "",

    "清单构件属性": ",".join( sorted( map(lambda x: f'{x["name"]}_{x["property_name"]}_{x["property_value"]}', x["tjqd2_score"]["element_attr"]) ) )  if "tjqd2_score" in x and x["tjqd2_score"] is not None and "element_attr" in x["tjqd2_score"] else "",
    "清单brief构件属性": ",".join( sorted( map(lambda x: f'{x["name"]}_{x["property_name"]}_{x["property_value"]}', x["bqitem_testrule_score"]["element_attr"]) ) )  if "bqitem_testrule_score" in x and x["bqitem_testrule_score"] is not None and "element_attr" in x["bqitem_testrule_score"] else "",

    "清单材料属性": ",".join( sorted( map(lambda x: f'{x["name"]}_{x["property_name"]}_{x["property_value"]}', x["tjqd2_score"]["material_attr"]) ) )   if "tjqd2_score" in x and x["tjqd2_score"] is not None and "material_attr" in x["tjqd2_score"] else "",
    "清单brief材料属性": ",".join( sorted( map(lambda x: f'{x["name"]}_{x["property_name"]}_{x["property_value"]}', x["bqitem_testrule_score"]["material_attr"]) ) )   if "bqitem_testrule_score" in x and x["bqitem_testrule_score"] is not None and "material_attr" in x["bqitem_testrule_score"] else "",

    }
extra_dependencies = evaluator_aecloud_list_pricelib_relation_dec_predict
keep_exists = True


[stage_aecloud_list_pricelib_relation_dec_export]
