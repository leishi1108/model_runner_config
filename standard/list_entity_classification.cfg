# 解析测试集 训练

[dataset_raw_list_data]
class = GlodonAECloudExportDataset
dir = /home/shilei/corpus/cost_split/GDE_预算清单-清单验证集-20250701-20260129已完成-导出
domain_model = "code": "清单编码", "description": "清单名称", "unit": "单位", "project_node_name": "单位工程名称", "full_name": "分部分项全路径", "spec": "项目特征", "work_scope": "工作内容", "is_measure": "是否措施","speciality": "专业", "feeType": "费用类别"

[dataset_raw_list_data_valid]
class = FilterDataset
input = raw_list_data
filters = ("specialty" in x) and ("安装专业" not in x["specialty"])


[dataset_raw_list_data_trans]
class = MapDataset
input = raw_list_data_valid
; input = raw_list_data
expression = exec('import re; import uuid') or {"item_id": uuid.uuid3(uuid.NAMESPACE_DNS, str(x["filepath"]).split("/")[-1].split("-解析预期结果")[0] + "-" + str(x["uid"])).hex,
    "list_key": str(x["filepath"]).split("/")[-1].split("-解析预期结果")[0] + "-" + str(x["uid"]),

    "item_name": x["清单名称"] if x["清单名称"] is not None else "",
    "item_feature": x["项目特征"] if x["项目特征"] is not None else "",
    "upper_item_name": x["分部分项全路径"] if x["分部分项全路径"] is not None else "",
    "unit": x["单位"] if x["单位"] is not None else "",

    "pid": str(x["filepath"]).split("/")[-1].split("-解析预期结果")[0],
    "item_name_wk": f'清单名称: {x["清单名称"]}' if x["清单名称"] is not None else "",
    "item_feature_wk": f'清单特征: {x["项目特征"]}' if x["项目特征"] is not None else "",
    "upper_item_name_wk": f'全路径: {x["分部分项全路径"]}' if x["分部分项全路径"] is not None else "",
    "unit_wk": f'单位: {x["单位"]}' if x["单位"] is not None else "",
    }
keep_exists = True


[dataset_list_data_label]
class = MapDataset
input = raw_list_data_trans
expression = {
    "element_label": list(sorted( [k for item in x["element"] for k, v in item.items() ] )),
    "material_label": list(sorted( [k for item in x["material"] for k, v in item.items() ] )),
;     "locElement_label": x["locElement"]
    "locElement_label": list(sorted( [k for item in x["locElement"] for k, v in item.items() ] )),
    }
keep_exists = True

