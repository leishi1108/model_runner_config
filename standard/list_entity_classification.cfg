# 实体预测

[model_gde_list_ner]
class = GDEListNerServiceModel
task_type = 清单
item_name_key = item_name
item_feature_key = item_feature
upper_item_name_key = upper_item_name
need_fields = item_name, item_feature, upper_item_name
re_predict = False

[evaluator_list_ner_predict]
class = SimplePredictor
datasets = list_data_label_merge
models = gde_list_ner
num_workers = 1

[dataset_list_data_label_merge_entity]
class = NerEntityDataset
input = list_data_label_merge
item_id_key = list_key
ner_score_key = gde_list_ner_score
extra_dependencies = evaluator_list_ner_predict

[dataset_list_material_entity]
class = FilterDataset
input = list_data_label_merge_entity
filters = ("类型" in x) and ("材料" in x["类型"])

; entity_info['内容'] + entity_info.get('属性内容', '') if entity_info["类型"] not in ["材料-普通混凝土", "材料-模板", "材料-钢筋", "材料-钢筋套筒"]
; else ": ".join([entity_info["类型"].split("-")[-1], entity_info['内容'] + entity_info.get('属性内容', '')]),
[dataset_list_material_entity_request]
class = MapDataset
input = list_material_entity
expression = {
    "text": x['内容'] + x.get('属性内容', '') if x["类型"] not in ["材料-普通混凝土", "材料-模板", "材料-钢筋", "材料-钢筋套筒", "单列-材料-普通混凝土", "单列-材料-模板", "单列-材料-钢筋", "单列-材料-钢筋套筒", ] else ": ".join([x["类型"].split("-")[-1], x['内容'] + x.get('属性内容', '')]),
    }
keep_exists = True


